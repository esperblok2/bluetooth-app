<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluetooth Device Scanner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      color: #fff;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 30px 0;
    }

    header h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    header p {
      color: #aaa;
      font-size: 0.95rem;
    }

    .btn-scan {
      display: block;
      width: 100%;
      max-width: 400px;
      margin: 20px auto;
      padding: 16px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0, 210, 255, 0.3);
    }

    .btn-scan:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0, 210, 255, 0.5);
    }

    .btn-scan:active {
      transform: translateY(0);
    }

    .btn-scan:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-scan.scanning {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      box-shadow: 0 4px 20px rgba(245, 87, 108, 0.3);
    }

    .status {
      text-align: center;
      margin: 10px 0;
      color: #aaa;
      font-size: 0.9rem;
      min-height: 24px;
    }

    .status.error {
      color: #f5576c;
    }

    .status.success {
      color: #00e676;
    }

    #devices {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 24px;
    }

    .device-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .device-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .device-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .device-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .device-icon.headphone {
      background: linear-gradient(135deg, #f093fb, #f5576c);
    }

    .device-icon.speaker {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .device-icon.watch {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
    }

    .device-icon.gamepad {
      background: linear-gradient(135deg, #fa709a, #fee140);
    }

    .device-icon.mouse {
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
    }

    .device-icon.keyboard {
      background: linear-gradient(135deg, #ffecd2, #fcb69f);
    }

    .device-icon.phone {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .device-icon.default {
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
    }

    .device-name {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .device-id {
      font-size: 0.8rem;
      color: #888;
      margin-top: 2px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .info-item {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      padding: 14px;
    }

    .info-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 1rem;
      font-weight: 500;
      word-break: break-all;
    }

    .battery-container {
      margin-top: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      padding: 16px;
    }

    .battery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .battery-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .battery-percentage {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .battery-percentage.high {
      color: #00e676;
    }

    .battery-percentage.medium {
      color: #ffd740;
    }

    .battery-percentage.low {
      color: #f5576c;
    }

    .battery-percentage.unknown {
      color: #888;
    }

    .battery-bar-bg {
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      overflow: hidden;
    }

    .battery-bar-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.5s ease;
      background: linear-gradient(90deg, #00e676, #3a7bd5);
    }

    .battery-bar-fill.medium {
      background: linear-gradient(90deg, #ffd740, #ff9100);
    }

    .battery-bar-fill.low {
      background: linear-gradient(90deg, #f5576c, #ff1744);
    }

    .battery-charging {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      color: #00e676;
      margin-top: 8px;
    }

    .battery-discharging {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 8px;
    }

    .btn-disconnect {
      margin-top: 14px;
      padding: 8px 20px;
      border: 1px solid rgba(245, 87, 108, 0.5);
      background: rgba(245, 87, 108, 0.1);
      color: #f5576c;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }

    .btn-disconnect:hover {
      background: rgba(245, 87, 108, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .no-bluetooth {
      text-align: center;
      padding: 40px;
      background: rgba(245, 87, 108, 0.1);
      border: 1px solid rgba(245, 87, 108, 0.3);
      border-radius: 12px;
      margin-top: 20px;
    }

    .no-bluetooth h3 {
      color: #f5576c;
      margin-bottom: 8px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .scanning-indicator {
      animation: pulse 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Bluetooth Scanner</h1>
      <p>Zoek en bekijk je Bluetooth apparaten</p>
    </header>

    <button id="scanBtn" class="btn-scan" onclick="startScan()">
      Zoek Bluetooth Apparaten
    </button>

    <div id="status" class="status"></div>

    <div id="noBluetooth" class="no-bluetooth" style="display: none;">
      <h3>Bluetooth niet beschikbaar</h3>
      <p>Je browser ondersteunt Web Bluetooth niet. Gebruik Chrome of Edge op desktop.</p>
    </div>

    <div id="devices"></div>
  </div>

  <script>
    const devicesContainer = document.getElementById('devices');
    const statusEl = document.getElementById('status');
    const scanBtn = document.getElementById('scanBtn');
    const noBluetoothEl = document.getElementById('noBluetooth');

    const connectedDevices = new Map();

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    function getDeviceType(name) {
      if (!name) return 'default';
      const n = name.toLowerCase();
      if (n.includes('airpod') || n.includes('buds') || n.includes('headphone') || n.includes('headset') || n.includes('earbuds') || n.includes('ear')) return 'headphone';
      if (n.includes('speaker') || n.includes('boombox') || n.includes('sound')) return 'speaker';
      if (n.includes('watch') || n.includes('band') || n.includes('fit')) return 'watch';
      if (n.includes('controller') || n.includes('gamepad') || n.includes('dualshock') || n.includes('xbox')) return 'gamepad';
      if (n.includes('mouse') || n.includes('logitech mx')) return 'mouse';
      if (n.includes('keyboard') || n.includes('keychron')) return 'keyboard';
      if (n.includes('phone') || n.includes('iphone') || n.includes('galaxy') || n.includes('pixel')) return 'phone';
      return 'default';
    }

    function getDeviceIcon(type) {
      const icons = {
        headphone: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>',
        speaker: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>',
        watch: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="7"/><polyline points="12 9 12 12 13.5 13.5"/><path d="M16.51 17.35l-.35 3.83a2 2 0 0 1-2 1.82H9.83a2 2 0 0 1-2-1.82l-.35-3.83m.01-10.7l.35-3.83A2 2 0 0 1 9.83 1h4.35a2 2 0 0 1 2 1.82l.35 3.83"/></svg>',
        gamepad: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><line x1="15" y1="13" x2="15.01" y2="13"/><line x1="18" y1="11" x2="18.01" y2="11"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg>',
        mouse: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="7"/><line x1="12" y1="2" x2="12" y2="10"/></svg>',
        keyboard: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><line x1="6" y1="8" x2="6.01" y2="8"/><line x1="10" y1="8" x2="10.01" y2="8"/><line x1="14" y1="8" x2="14.01" y2="8"/><line x1="18" y1="8" x2="18.01" y2="8"/><line x1="6" y1="12" x2="6.01" y2="12"/><line x1="10" y1="12" x2="10.01" y2="12"/><line x1="14" y1="12" x2="14.01" y2="12"/><line x1="18" y1="12" x2="18.01" y2="12"/><line x1="8" y1="16" x2="16" y2="16"/></svg>',
        phone: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>',
        default: '<svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="1" width="14" height="22" rx="3"/><circle cx="12" cy="18" r="1"/></svg>'
      };
      return icons[type] || icons.default;
    }

    function createDeviceCard(deviceId, name, server) {
      const type = getDeviceType(name);
      const card = document.createElement('div');
      card.className = 'device-card';
      card.id = 'device-' + deviceId;
      card.innerHTML = `
        <div class="device-header">
          <div class="device-icon ${type}">${getDeviceIcon(type)}</div>
          <div>
            <div class="device-name">${name || 'Onbekend apparaat'}</div>
            <div class="device-id">${deviceId}</div>
          </div>
        </div>
        <div id="info-${deviceId}" class="info-grid">
          <div class="info-item"><div class="info-label">Status</div><div class="info-value">Verbonden</div></div>
        </div>
        <div class="battery-container" id="battery-${deviceId}">
          <div class="battery-header">
            <span class="battery-label">Batterij</span>
            <span class="battery-percentage unknown" id="battery-pct-${deviceId}">Laden...</span>
          </div>
          <div class="battery-bar-bg">
            <div class="battery-bar-fill" id="battery-bar-${deviceId}" style="width: 0%"></div>
          </div>
        </div>
        <button class="btn-disconnect" onclick="disconnectDevice('${deviceId}')">Ontkoppelen</button>
      `;
      return card;
    }

    async function readDeviceInfo(gatt) {
      const info = {};
      try {
        const service = await gatt.getPrimaryService('device_information');
        const chars = [
          { uuid: '2a29', name: 'Fabrikant' },
          { uuid: '2a24', name: 'Model' },
          { uuid: '2a27', name: 'Hardware revisie' },
          { uuid: '2a26', name: 'Software revisie' },
          { uuid: '2a28', name: 'Firmware revisie' },
          { uuid: '2a25', name: 'Serienummer' },
        ];
        for (const c of chars) {
          try {
            const characteristic = await service.getCharacteristic(c.uuid);
            const value = await characteristic.readValue();
            info[c.name] = new TextDecoder().decode(value);
          } catch {}
        }
      } catch {}
      return info;
    }

    async function readBattery(gatt, deviceId) {
      try {
        const service = await gatt.getPrimaryService('battery_service');
        const characteristic = await service.getCharacteristic('battery_level');
        const value = await characteristic.readValue();
        const level = value.getUint8(0);
        updateBatteryUI(deviceId, level, characteristic);

        characteristic.addEventListener('characteristicvaluechanged', (event) => {
          const newLevel = event.target.value.getUint8(0);
          updateBatteryUI(deviceId, newLevel, characteristic);
        });
        await characteristic.startNotifications();
      } catch {
        updateBatteryUI(deviceId, null);
      }
    }

    function updateBatteryUI(deviceId, level, characteristic) {
      const pctEl = document.getElementById('battery-pct-' + deviceId);
      const barEl = document.getElementById('battery-bar-' + deviceId);
      const container = document.getElementById('battery-' + deviceId);
      if (!pctEl || !barEl) return;

      if (level === null) {
        pctEl.textContent = 'Niet beschikbaar';
        pctEl.className = 'battery-percentage unknown';
        barEl.style.width = '0%';
        return;
      }

      pctEl.textContent = level + '%';
      barEl.style.width = level + '%';

      pctEl.className = 'battery-percentage';
      barEl.className = 'battery-bar-fill';

      if (level > 60) {
        pctEl.classList.add('high');
      } else if (level > 20) {
        pctEl.classList.add('medium');
        barEl.classList.add('medium');
      } else {
        pctEl.classList.add('low');
        barEl.classList.add('low');
      }
    }

    async function startScan() {
      if (!navigator.bluetooth) {
        noBluetoothEl.style.display = 'block';
        return;
      }

      scanBtn.disabled = true;
      scanBtn.classList.add('scanning');
      scanBtn.innerHTML = '<span class="spinner"></span> Scannen...';
      setStatus('Zoek naar Bluetooth apparaten...', 'scanning-indicator');

      try {
        const device = await navigator.bluetooth.requestDevice({
          acceptAllDevices: true,
          optionalServices: ['battery_service', 'device_information']
        });

        setStatus('Verbinden met ' + (device.name || 'apparaat') + '...');

        device.addEventListener('gattserverdisconnected', () => {
          connectedDevices.delete(device.id);
          const card = document.getElementById('device-' + device.id);
          if (card) card.remove();
          if (connectedDevices.size === 0) {
            setStatus('Apparaat ontkoppeld', 'error');
          }
        });

        const server = await device.gatt.connect();
        const deviceId = device.id;
        connectedDevices.set(deviceId, { device, server });

        const card = createDeviceCard(deviceId, device.name, server);
        devicesContainer.appendChild(card);

        const info = await readDeviceInfo(server);
        const infoGrid = document.getElementById('info-' + deviceId);
        if (Object.keys(info).length > 0) {
          let html = '';
          for (const [key, value] of Object.entries(info)) {
            html += `<div class="info-item"><div class="info-label">${key}</div><div class="info-value">${value}</div></div>`;
          }
          html += `<div class="info-item"><div class="info-label">Verbinding</div><div class="info-value">Actief</div></div>`;
          infoGrid.innerHTML = html;
        }

        await readBattery(server, deviceId);

        setStatus((device.name || 'Apparaat') + ' verbonden!', 'success');

      } catch (err) {
        if (err.name === 'NotFoundError') {
          setStatus('Geen apparaat geselecteerd', 'error');
        } else {
          setStatus('Fout: ' + err.message, 'error');
        }
      } finally {
        scanBtn.disabled = false;
        scanBtn.classList.remove('scanning');
        scanBtn.innerHTML = 'Zoek Bluetooth Apparaten';
      }
    }

    async function disconnectDevice(deviceId) {
      const info = connectedDevices.get(deviceId);
      if (info) {
        try {
          info.device.gatt.disconnect();
        } catch {}
      }
      connectedDevices.delete(deviceId);
      const card = document.getElementById('device-' + deviceId);
      if (card) card.remove();
      setStatus('Apparaat ontkoppeld', 'error');
    }

    if (!navigator.bluetooth) {
      noBluetoothEl.style.display = 'block';
    }
  </script>
</body>
</html>
